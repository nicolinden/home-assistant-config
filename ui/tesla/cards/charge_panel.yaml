type: vertical-stack
cards:
  # Snelle acties (alleen relevant als kabel erin zit)
  - type: conditional
    conditions:
      - entity: binary_sensor.k_i_t_t_charge_cable
        state: "on"
    card:
      type: grid
      columns: 2
      square: false
      cards:
        - type: tile
          entity: switch.k_i_t_t_charge
          name: Laden
          icon: mdi:flash
          tap_action:
            action: toggle

        - type: tile
          entity: lock.k_i_t_t_charge_cable_lock
          name: Kabel lock
          icon: mdi:lock
          tap_action:
            action: more-info

  # Charge port (alleen als GEEN kabel)
  - type: conditional
    conditions:
      - entity: binary_sensor.k_i_t_t_charge_cable
        state: "off"
    card:
      type: tile
      entity: cover.k_i_t_t_charge_port_door
      name: Charge port
      icon: mdi:car-door
      tap_action:
        action: more-info

  # Details (altijd ok om te tonen; sommige worden unknown)
  - type: entities
    title: Laden details
    show_header_toggle: false
    entities:
      - entity: number.k_i_t_t_charge_limit
        name: Charge limit
      - entity: number.k_i_t_t_charge_current
        name: Max stroom (A)
      - entity: sensor.k_i_t_t_charge_rate
        name: Charge rate
      - entity: sensor.k_i_t_t_charge_energy_added
        name: Energy added
      - entity: sensor.k_i_t_t_charger_power
        name: Charger power
      - entity: sensor.k_i_t_t_charger_voltage
        name: Charger voltage
      - entity: sensor.k_i_t_t_charger_current
        name: Charger current
      - entity: sensor.k_i_t_t_fast_charger_type
        name: Fast charger type
      - entity: sensor.k_i_t_t_time_to_full_charge
        name: Time to full
      - entity: sensor.k_i_t_t_estimate_battery_range
        name: Range (est.)