- sensor:
    - name: "kitt_open_doors_count"
      unique_id: kitt_open_doors_count
      icon: mdi:car-door
      state: >
        {{
          [
            states('binary_sensor.k_i_t_t_front_driver_door'),
            states('binary_sensor.k_i_t_t_front_passenger_door'),
            states('binary_sensor.k_i_t_t_rear_driver_door'),
            states('binary_sensor.k_i_t_t_rear_passenger_door')
          ] | select('eq', 'on') | list | count
        }}

    - name: "kitt_open_windows_count"
      unique_id: kitt_open_windows_count
      icon: mdi:car-door
      state: >
        {{
          [
            states('binary_sensor.k_i_t_t_front_driver_window'),
            states('binary_sensor.k_i_t_t_front_passenger_window'),
            states('binary_sensor.k_i_t_t_rear_driver_window'),
            states('binary_sensor.k_i_t_t_rear_passenger_window')
          ] | select('eq', 'on') | list | count
        }}

    - name: kitt_time_to_full_charge_remaining
      icon: mdi:clock-outline
      state: >
        {% set finish = states('sensor.k_i_t_t_time_to_full_charge') %}
        {% if finish not in ['unknown','unavailable',''] %}
          {% set diff = (as_timestamp(finish) - as_timestamp(now())) | int %}
          {% if diff <= 0 %}
            Vol
          {% else %}
            {% set hours = diff // 3600 %}
            {% set minutes = (diff % 3600) // 60 %}
            {{ hours }}u {{ minutes }}m
          {% endif %}
        {% else %}
          -
        {% endif %}        
        

