- binary_sensor:
    - name: "kitt_any_door_open"
      unique_id: kitt_any_door_open
      icon: mdi:car-door
      state: >
        {{
          is_state('binary_sensor.k_i_t_t_front_driver_door', 'on') or
          is_state('binary_sensor.k_i_t_t_front_passenger_door', 'on') or
          is_state('binary_sensor.k_i_t_t_rear_driver_door', 'on') or
          is_state('binary_sensor.k_i_t_t_rear_passenger_door', 'on')
        }}

    - name: "kitt_any_window_open"
      unique_id: kitt_any_window_open
      icon: mdi:car-door
      state: >
        {{
          is_state('binary_sensor.k_i_t_t_front_driver_window', 'on') or
          is_state('binary_sensor.k_i_t_t_front_passenger_window', 'on') or
          is_state('binary_sensor.k_i_t_t_rear_driver_window', 'on') or
          is_state('binary_sensor.k_i_t_t_rear_passenger_window', 'on')
        }}

