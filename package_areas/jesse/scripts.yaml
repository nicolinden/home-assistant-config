stuur_bericht_naar_jesse_pc:
  alias: Stuur bericht naar Jesse PC
  mode: single
  fields:
    bericht:
      name: Bericht
      description: Bericht dat direct meegegeven wordt via API/shortcut
      selector:
        text:
  sequence:
    - variables:
        final_bericht: >
          {% set direct = bericht | default('') | trim %}
          {% set helper = states('input_text.jesse_pc_bericht') | trim %}
          {{ direct if direct != '' else helper }}

    - condition: template
      value_template: "{{ final_bericht != '' }}"

    - action: notify.jesse_game_pc
      data:
        title: Home Assistant
        message: "{{ final_bericht }}"

    - if:
        - condition: template
          value_template: "{{ states('input_text.jesse_pc_bericht') | trim != '' }}"
      then:
        - action: input_text.set_value
          target:
            entity_id: input_text.jesse_pc_bericht
          data:
            value: ""

jesse_lampen_toggle_slim:
  alias: Jesse lampen slim toggle
  mode: single
  sequence:
    - variables:
        main_lights:
          - light.ikea_of_sweden_ormanas_led_strip
          - light.jesse_plafond
          - light.jesse_vide
          - light.plug_mini_eu
          - light.lines_cbe8
        desk_lamp: light.jesse_bureaulamp_2

    - choose:
        # ALS alles uit is → AAN zetten (zonder bureaulamp)
        - conditions:
            - condition: template
              value_template: >
                {{ expand(main_lights + [desk_lamp])
                    | selectattr('state','eq','on')
                    | list
                    | count == 0 }}
          sequence:
            - action: light.turn_on
              target:
                entity_id: "{{ main_lights }}"

      default:
        # ANDERS → alles UIT (incl bureaulamp)
        - action: light.turn_off
          target:
            entity_id: >
              {{ main_lights + [desk_lamp] }}

