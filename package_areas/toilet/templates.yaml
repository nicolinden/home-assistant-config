- binary_sensor:
    - name: toilet_beneden_lights_on
      unique_id: toilet_beneden_lights_on
      state: >
        {% set ignore = label_entities('dontCountAsLight') | list %}
        {% set ids = area_entities('toilet_beneden')
          | select('match','^light\\.')
          | reject('in', ignore)
          | list %}
        {{ ids | count > 0 and (expand(ids) | selectattr('state','eq','on') | list | count > 0) }}

    - name: toilet_boven_lights_on
      unique_id: toilet_boven_lights_on
      state: >
        {% set ignore = label_entities('dontCountAsLight') | list %}
        {% set ids = area_entities('toilet_boven')
          | select('match','^light\\.')
          | reject('in', ignore)
          | list %}
        {{ ids | count > 0 and (expand(ids) | selectattr('state','eq','on') | list | count > 0) }}

- sensor:
    - name: toilet_beneden_lights_on_count
      unique_id: toilet_beneden_lights_on_count
      icon: mdi:lightbulb
      state: >
        {% set ignore = label_entities('dontCountAsLight') | list %}
        {% set ids = area_entities('toilet_beneden')
          | select('match','^light\\.')
          | reject('in', ignore)
          | list %}
        {{ expand(ids) | selectattr('state','eq','on') | list | count }}

    - name: toilet_boven_lights_on_count
      unique_id: toilet_boven_lights_on_count
      icon: mdi:lightbulb
      state: >
        {% set ignore = label_entities('dontCountAsLight') | list %}
        {% set ids = area_entities('toilet_boven')
          | select('match','^light\\.')
          | reject('in', ignore)
          | list %}
        {{ expand(ids) | selectattr('state','eq','on') | list | count }}