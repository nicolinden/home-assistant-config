- id: gamekamer_motion_lighting_on
  alias: Gamekamer - Motion lighting on
  mode: restart
  trigger:
    - platform: state
      entity_id: binary_sensor.gameroom_sensor_motion
      to: "on"
      id: motion_on

    - platform: state
      entity_id: input_boolean.gamekamer_work_mode
      to: "off"
      id: work_mode_off

    - platform: state
      entity_id: input_boolean.gamekamer_work_mode
      to: "on"
      id: work_mode_on

  action:
    - choose:
        # Work mode aangezet -> alles blokkeren en timer stoppen
        - conditions:
            - condition: trigger
              id: work_mode_on
          sequence:
            - service: timer.cancel
              target:
                entity_id: timer.gamekamer_motion_off

            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.gamekamer_motion_active

            - stop: "Work mode is aan; motion automation volledig geblokkeerd"

    # Alleen verder als work mode uit staat
    - condition: state
      entity_id: input_boolean.gamekamer_work_mode
      state: "off"

    # Alleen verder als er nu motion is
    - condition: state
      entity_id: binary_sensor.gameroom_sensor_motion
      state: "on"

    # Alleen actief buiten 08:00 - 16:00
    - condition: or
      conditions:
        - condition: time
          before: "08:00:00"
        - condition: time
          after: "16:00:00"

    # Nieuwe motion = lopende off-timer annuleren/resetten
    - service: timer.cancel
      target:
        entity_id: timer.gamekamer_motion_off

    # Scene toepassen op basis van tijd
    - choose:
        # 21:00 - 08:00
        - conditions:
            - condition: or
              conditions:
                - condition: time
                  after: "21:00:00"
                - condition: time
                  before: "08:00:00"
          sequence:
            - service: scene.turn_on
              target:
                entity_id: scene.gamekamer_nacht

        # 16:00 - 21:00
        - conditions:
            - condition: time
              after: "16:00:00"
              before: "21:00:00"
          sequence:
            - service: scene.turn_on
              target:
                entity_id: scene.gamekamer_ontspannen

    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.gamekamer_motion_active

- id: gamekamer_motion_lighting_start_off_timer
  alias: Gamekamer - Motion lighting start off timer
  mode: restart
  trigger:
    - platform: state
      entity_id: binary_sensor.gameroom_sensor_motion
      to: "off"

  condition:
    - condition: state
      entity_id: input_boolean.gamekamer_work_mode
      state: "off"

    - condition: state
      entity_id: input_boolean.gamekamer_motion_active
      state: "on"

    # Alleen timer starten buiten 08:00 - 16:00
    - condition: or
      conditions:
        - condition: time
          before: "08:00:00"
        - condition: time
          after: "16:00:00"

  action:
    - service: timer.start
      target:
        entity_id: timer.gamekamer_motion_off
      data:
        duration: "00:10:00"

- id: gamekamer_motion_lighting_timer_finished
  alias: Gamekamer - Motion lighting timer finished
  mode: single
  trigger:
    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.gamekamer_motion_off

  condition:
    - condition: state
      entity_id: input_boolean.gamekamer_work_mode
      state: "off"

    - condition: state
      entity_id: input_boolean.gamekamer_motion_active
      state: "on"

    - condition: state
      entity_id: binary_sensor.gameroom_sensor_motion
      state: "off"

  action:
    - service: light.turn_off
      target:
        entity_id: light.gamekamer

    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.gamekamer_motion_active