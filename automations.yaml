    hot_temp: '{{ states(''input_number.screens_hot_temp_c'') | float(26) }}'
    close_on_hot_sunny: '{{ is_state(''input_boolean.screens_close_on_hot_sunny'',''on'')
      }}'
    is_sunnyish: '{{ w_state_l in [''sunny'',''partlycloudy'',''clear-night''] }}'
    hot_and_sunny: '{% set temp = (w_temp | float(0)) %} {{ close_on_hot_sunny and
      temp >= (hot_temp | float) and is_sunnyish }}'
- id: '1769851596410'
  alias: Weer + screens status (debug) naar iPhone
  description: ''
  triggers:
  - at: 09:00:00
    trigger: time
  actions:
  - variables:
      weather_entity: weather.openweathermap
      temp_sensor: sensor.openweathermap_apparent_temperature
      covers:
      - cover.feline
      - cover.jesse
      - cover.kantoor_voor
      - cover.kantoor_zij
      - cover.keuken
      - cover.slaapkamer_links
      - cover.slaapkamer_rechts
      - cover.woonkamer
      open_lines: "{% set lines = [] %} {% for s in expand(covers) %}\n  {% set pos
        = s.attributes.current_position %}\n  {% if pos is number %}\n    {# Aanname:
        0 = dicht, alles anders = niet-dicht #}\n    {% if (pos | int) != 0 %}\n      {%
        set lines = lines + ['- ' ~ s.name ~ ' | pos=' ~ (pos|int) ~ '% | state='
        ~ s.state] %}\n    {% endif %}\n  {% else %}\n    {# Fallback op state #}\n
        \   {% if s.state not in ['closed','closing','unavailable','unknown'] %}\n
        \     {% set lines = lines + ['- ' ~ s.name ~ ' | state=' ~ s.state] %}\n
        \   {% endif %}\n  {% endif %}\n{% endfor %} {{ lines | join('\\n') }}"
      closed_lines: "{% set lines = [] %} {% for s in expand(covers) %}\n  {% set
        pos = s.attributes.current_position %}\n  {% if pos is number %}\n    {% if
        (pos | int) == 0 %}\n      {% set lines = lines + ['- ' ~ s.name ~ ' | pos='
        ~ (pos|int) ~ '% | state=' ~ s.state] %}\n    {% endif %}\n  {% else %}\n
        \   {% if s.state in ['closed','closing'] %}\n      {% set lines = lines +
        ['- ' ~ s.name ~ ' | state=' ~ s.state] %}\n    {% endif %}\n  {% endif %}\n{%
        endfor %} {{ lines | join('\\n') }}"
      debug_lines: "{% set lines = [] %} {% for s in expand(covers) %}\n  {% set pos
        = s.attributes.current_position %}\n  {% if pos is number %}\n    {% set lines
        = lines + ['- ' ~ s.entity_id ~ ' | ' ~ s.state ~ ' | pos=' ~ (pos|int) ~
        '%'] %}\n  {% else %}\n    {% set lines = lines + ['- ' ~ s.entity_id ~ '
        | ' ~ s.state ~ ' | pos=NA'] %}\n  {% endif %}\n{% endfor %} {{ lines | join('\\n')
        }}"
      w_state: '{{ states(weather_entity) }}'
      w_temp: '{{ states(temp_sensor) }}'
      w_wind: '{{ state_attr(weather_entity, ''wind_speed'') }}'
      w_hum: '{{ state_attr(weather_entity, ''humidity'') }}'
      msg: "\U0001F324 Weer (current): - Conditie: {{ w_state }} - Gevoelstemperatuur:
        {{ w_temp }} °C - Wind: {{ w_wind }} km/h - Luchtvochtigheid: {{ w_hum }}
        %\n{% if open_lines | trim != '' %} \U0001FA9F Screens OPEN (volgens HA):
        {{ open_lines }} {% else %} ✅ Alle screens staan dicht (volgens HA) {% endif
        %}\n---- \U0001F50E Debug (state/pos per cover): {{ debug_lines }}"
  - data:
      title: Weer + screens status
      message: '{{ msg }}'
      data:
        tag: screens_weather_status
        notification_icon: mdi:weather-partly-cloudy
        priority: high
    action: notify.mobile_app_iphone_15_pro_max
  mode: single
- id: '1770220569199'
  alias: Tesla status om 21:00
  description: Stuurt batterijstatus en laadstatus om 21:00
  triggers:
  - at: '21:00:00'
    trigger: time
  actions:
  - data:
      title: "\U0001F697 Tesla status"
      message: "Batterij: {{ states('sensor.k_i_t_t_battery_level') }}% {% if is_state('switch.k_i_t_t_charge',
        'on') %}\n  \U0001F50C Hij is aan het laden.\n{% else %}\n  ❌ Hij is niet
        aan het laden.\n{% endif %}"
    action: notify.mobile_app_iphone_15_pro_max
  mode: single
- id: '1770220613148'
