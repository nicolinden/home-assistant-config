    value_template: '{{ hot_and_sunny and (open_covers | length > 0) }}'
  - data:
      title: Screens DICHT doen (warm & zonnig)
      message: 'Reden: warm & zonnig (>= {{ hot_temp }}°C, {{ w_state }})

        Nog OPEN: {% for c in open_covers %} - {{ state_attr(c,''friendly_name'')
        or c }} ({{ states(c) }}) {% endfor %}

        Weer (current): - Conditie: {{ w_state }} - Temp: {{ w_temp }}°C - Wind: {{
        w_wind }} km/h - Luchtvochtigheid: {{ w_hum }}%

        {% if fc_cond is not none or fc_temp is not none or fc_precip is not none
