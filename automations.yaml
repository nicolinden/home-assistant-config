    - cover.kantoor_voor
    - cover.kantoor_zij
    - cover.keuken
    - cover.slaapkamer_links
    - cover.slaapkamer_rechts
    - cover.woonkamer
    open_covers: "{% set out = [] %} {% for c in covers %}\n  {% if states(c) not
      in ['closed','closing','unavailable','unknown'] %}\n    {% set out = out + [c]
      %}\n  {% endif %}\n{% endfor %} {{ out }}"
    w_state: '{{ states(weather_entity) }}'
    w_state_l: '{{ states(weather_entity) | lower }}'
    w_temp: '{{ state_attr(weather_entity, ''temperature'') }}'
    w_wind: '{{ state_attr(weather_entity, ''wind_speed'') }}'
